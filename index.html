        function getTeamsFromMatch(matchName) {
            const parts = matchName.split(' ');
            if (parts.length >= 3 && (parts[1] === 'VS' || parts[2] === 'VS')) {
                if (parts[1] === 'VS') return [parts[0], parts[2]];
                if (parts[2] === 'VS') return [parts[1], parts[3]];
            }
            return null;
        }

        function getPlayerImagePath(playerName) {
            const initials = PLAYER_INITIALS[playerName];
            if (initials) return `${initials}.png`;
            return null;
        }

        function getPlayerInitialsText(playerName) {
            return playerName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }

        function renderPlayerAvatar(playerName, size = "small") {
            const imgPath = getPlayerImagePath(playerName);
            const initials = getPlayerInitialsText(playerName);
            if (size === "large") {
                if (imgPath) {
                    return `<div class="player-avatar-large"><img src="${imgPath}" alt="${playerName}" onerror="this.onerror=null; this.parentElement.innerHTML='<span>${initials}</span>';"></div>`;

                    return `<div class="player-avatar-large"><span>${initials}</span></div>`;
                }

                if (imgPath) {

        async function apiRequest(url, options = {}) {
            const headers = { ...(options.headers || {}) };
            const adminToken = getAdminToken();
            if (adminToken) {
                headers.Authorization = `Bearer ${adminToken}`;
            }

            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) {
                isAdminMode = false;
                setAdminToken("");
            }
            return res;
        }

        // Helper: fetch all data from server
        async function fetchGlobalData() {
            try {
                const res = await apiRequest('/api/data');
                if (!res.ok) throw new Error('Failed to fetch data');
                const data = await res.json();
                globalData = data;
                return true;
            } catch (err) {
                console.error(err);
                document.getElementById("appContainer").innerHTML = `<div class="card"><h2>Connection Error</h2><p>Could not connect to the API.</p><p>For deployment, make sure the Vercel project has the required environment variables configured.</p></div>`;
                return false;
            }
        }

        // Helper: compute points for a player
        function computePlayerPoints(playerName) {
            const preds = globalData.playerPredictions[playerName]?.predictions;
            if (!preds) return { matchWinPoints: 0, motmPoints: 0, seasonPoints: 0, total: 0 };
            let matchWinTotal = 0, motmTotal = 0;
            for (let i = 0; i < IPL_MATCHES.length; i++) {
                const predMatch = preds.matchPredictions[i];
                const actual = globalData.actualResults.matches[i];
                if (actual && predMatch) {
                    if (predMatch.winner && predMatch.winner === actual.winner) matchWinTotal += 2;
                    if (predMatch.motm && predMatch.motm === actual.motm) motmTotal += 5;
                }
            }
            let seasonTotal = 0;
            const season = preds.season;
            const sa = globalData.actualResults.seasonActual;
            if (season.tournamentWinner && sa.tournamentWinner === season.tournamentWinner) seasonTotal += 20;
            if (season.top4 && sa.top4) {
                for (let t of season.top4) if (sa.top4.includes(t)) seasonTotal += 10;
            }
            if (season.orangeCap.first && sa.orangeCapWinner === season.orangeCap.first) seasonTotal += 15;
            else if (season.orangeCap.second && sa.orangeCapWinner === season.orangeCap.second) seasonTotal += 12;
            else if (season.orangeCap.third && sa.orangeCapWinner === season.orangeCap.third) seasonTotal += 10;
            if (season.purpleCap.first && sa.purpleCapWinner === season.purpleCap.first) seasonTotal += 15;
            else if (season.purpleCap.second && sa.purpleCapWinner === season.purpleCap.second) seasonTotal += 12;
            else if (season.purpleCap.third && sa.purpleCapWinner === season.purpleCap.third) seasonTotal += 10;
            if (season.pott.first && sa.pottWinner === season.pott.first) seasonTotal += 15;
            else if (season.pott.second && sa.pottWinner === season.pott.second) seasonTotal += 12;
            else if (season.pott.third && sa.pottWinner === season.pott.third) seasonTotal += 10;
            return { matchWinPoints: matchWinTotal, motmPoints: motmTotal, seasonPoints: seasonTotal, total: matchWinTotal + motmTotal + seasonTotal };
        }

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })

                const data = await res.json();
                if (data.success) {

                    html += `<div class="pred-row"><span class="pred-label">Winner</span><input type="text" id="adminWin_${i}" placeholder="Winner" value="${existing.winner || ''}"></div>`;
                }
                html += `<div class="pred-row"><span class="pred-label">MOTM</span><input type="text" id="adminMotm_${i}" placeholder="MOTM" value="${existing.motm || ''}"></div></div>`;
            }
            html += `</div><button id="saveMatchResultsBtn">Save All Match Results</button></div>`;
            html += `<div class="admin-section" style="margin-top:1rem"><h3>Season Awards Actuals</h3>`;
            const sa = globalData.actualResults.seasonActual;
            html += `<div class="pred-row"><span class="pred-label">Tournament Winner</span><input type="text" id="actualTourney" value="${sa.tournamentWinner || ''}"></div>`;
            html += `<div><span class="pred-label">Top 4 Teams</span><div class="pred-row">`;
            for (let i = 0; i < 4; i++) html += `<input type="text" class="actualTop4" data-idx="${i}" placeholder="Team ${i+1}" value="${sa.top4[i] || ''}" style="width:120px">`;
            html += `</div></div><div class="pred-row"><span class="pred-label">Orange Cap Winner</span><input type="text" id="actualOrange" value="${sa.orangeCapWinner || ''}"></div>`;
            html += `<div class="pred-row"><span class="pred-label">Purple Cap Winner</span><input type="text" id="actualPurple" value="${sa.purpleCapWinner || ''}"></div>`;
            html += `<div class="pred-row"><span class="pred-label">POTT Winner</span><input type="text" id="actualPott" value="${sa.pottWinner || ''}"></div>`;
            html += `<button id="saveSeasonActualBtn">Save Season Awards</button></div></div>`;
            document.getElementById("appContainer").innerHTML = html;

            document.getElementById("adminMatchSearch")?.addEventListener("input", (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll("#adminMatchesContainer .match-item").forEach(item => {
                    item.style.display = item.getAttribute("data-match-name").includes(term) ? "block" : "none";
                });
            });
            document.getElementById("saveMatchResultsBtn")?.addEventListener("click", async () => {
                const newMatches = {};
                for (let i = 0; i < IPL_MATCHES.length; i++) {
                    newMatches[i] = {
                        winner: document.getElementById(`adminWin_${i}`)?.value || null,
                        motm: document.getElementById(`adminMotm_${i}`)?.value || null
                    };
                }
                await saveMatchResults(newMatches);
                renderAdminPanel();
            });
            document.getElementById("saveSeasonActualBtn")?.addEventListener("click", async () => {
                let top4Arr = [];
                for (let i = 0; i < 4; i++) top4Arr.push(document.querySelector(`.actualTop4[data-idx="${i}"]`).value);
                const seasonData = {
                    tournamentWinner: document.getElementById("actualTourney").value || null,
                    top4: top4Arr.filter(t => t),
                    orangeCapWinner: document.getElementById("actualOrange").value || null,
                    purpleCapWinner: document.getElementById("actualPurple").value || null,
                    pottWinner: document.getElementById("actualPott").value || null
                };
                await saveSeasonActuals(seasonData);
                renderAdminPanel();
            });
        };

        document.querySelector('.nav-link[data-view="leaderboard"]').textContent = "Leaderboard";
        document.querySelector('.nav-link[data-view="players"]').textContent = "Players";
        document.querySelector('.nav-link[data-view="winners"]').textContent = "Results";
        document.querySelector('.nav-link[data-view="prevWinners"]').textContent = "Champions";
        document.querySelector('.nav-link[data-view="rules"]').textContent = "Rules";
        document.querySelector('.nav-link[data-view="more"]').textContent = "More";
        document.querySelector('.nav-link[data-view="admin"]').textContent = "Admin";

        // Initialization: fetch data from backend, then start
        (async function init() {
            isAdminMode = !!getAdminToken();
            const success = await fetchGlobalData();
            if (success) handleNavigation("leaderboard");
        })();

        document.querySelectorAll(".nav-link").forEach(btn => {
            btn.addEventListener("click", () => handleNavigation(btn.getAttribute("data-view")));
        });
    </script>
</body>
</html>
