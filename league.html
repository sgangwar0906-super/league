<body>
    <div class="navbar">
        <div class="logo">
            <h1>ANISHT DEV POLL LEAGUE 2026</h1>
        </div>
        <div class="nav-links">
            <button class="nav-link active" data-view="leaderboard">🏅 Leaderboard</button>
            <button class="nav-link" data-view="players">👥 Player Profiles</button>
            <button class="nav-link" data-view="winners">📋 Winners & Results</button>
            <button class="nav-link" data-view="prevWinners">🏆 Previous Year Winners</button>

        </div>
    </div>
    <div class="auto-save-badge" id="autoSaveBadge">💾 Auto-saved</div>

    <div class="container" id="appContainer"></div>

    <script>
        // ======================== ADPL 2026 PLAYERS ========================
        const ADPL_PLAYERS = [
            "Samarth Gangwar", "Divyansh Tyagi", "Dhairya Kumar", "Akshay Pratap",
            "Saksham Rathore", "Syed Askari", "Shaz Huassain", "Aqdas Raza",
            "Shubh Saxena", "Chirag Saxena", "Amrit Johri", "Hirdyansh Sahni"
        ];

        const PLAYER_INITIALS = {
            "Samarth Gangwar": "sg", "Divyansh Tyagi": "dt", "Dhairya Kumar": "dk",
            "Akshay Pratap": "ap", "Saksham Rathore": "sr", "Syed Askari": "sa",
            "Shaz Huassain": "sh", "Aqdas Raza": "ar", "Shubh Saxena": "ss",
            "Chirag Saxena": "cs", "Amrit Johri": "aj", "Hirdyansh Sahni": "hs"
        };

        function getPlayerImagePath(playerName) {
            const initials = PLAYER_INITIALS[playerName];
            if (initials) {
                return `images/players/${initials}.png`;
            }
            return null;
        }

        function getPlayerInitialsText(playerName) {
            return playerName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }

        function renderPlayerAvatar(playerName, size = "small") {
            const imgPath = getPlayerImagePath(playerName);
            const initials = getPlayerInitialsText(playerName);
            
            if (size === "large") {
                if (imgPath) {
                    return `<div class="player-avatar-large">
                                <img src="${imgPath}" alt="${playerName}" onerror="this.onerror=null; this.parentElement.innerHTML='<span>${initials}</span>';">
                            </div>`;
                } else {
                    return `<div class="player-avatar-large"><span>${initials}</span></div>`;
                }
            } else {
                if (imgPath) {
                    return `<div class="player-avatar">
                                <img src="${imgPath}" alt="${playerName}" onerror="this.onerror=null; this.parentElement.innerHTML='<span>${initials}</span>';">
                            </div>`;
                } else {
                    return `<div class="player-avatar"><span>${initials}</span></div>`;
                }
            }
        }

        const IPL_MATCHES = [
            "M1 RCB VS SRH", "M2 MI VS KKR", "M3 RR VS CSK", "M4 PBKS VS GT", "M5 LSG VS DC",
            "M6 KKR VS SRH", "M7 CSK VS PBKS", "M8 DC VS MI", "M9 GT VS RR", "M10 SRH VS LSG",
            "M11 RCB VS CSK", "M12 KKR VS PBKS", "M13 RR VS MI", "M14 DC VS GT", "M15 KKR VS LSG",
            "M16 RR VS RCB", "M17 PBKS VS SRH", "M18 CSK VS DC", "M19 LSG VS GT", "M20 MI VS RCB",
            "M21 SRH VS RR", "M22 CSK VS KKR", "M23 RCB VS LSG", "M24 MI VS PBKS", "M25 GT VS KKR",
            "M26 RCB VS DC", "M27 SRH VS CSK", "M28 KKR VS RR", "M29 PBKS VS LSG", "M30 GT VS MI",
            "M31 SRH VS DC", "M32 RCB VS GT", "M33 MI VS CSK", "M34 RCB VS GT", "M35 DC VS PBKS",
            "M36 RR VS SRH", "M37 GT VS CSK", "M38 LSG VS KKR", "M39 DC VS RCB", "M40 PBKS VS RR",
            "M41 MI VS SRH", "M42 GT VS RCB", "M43 RR VS DC", "M44 CSK VS MI", "M45 SRH VS KKR",
            "M46 GT VS PBKS", "M47 LSG VS RCB", "M48 DC VS CSK", "M49 SRH VS PBKS", "M50 LSG VS RCB",
            "M51 DC VS KKR", "M52 RR VS GT", "M53 CSK VS LSG", "M54 RCB VS MI", "M55 PBKS VS DC",
            "M56 GT VS SRH", "M57 RCB VS KKR", "M58 PBKS VS MI", "M59 LSG VS CSK", "M60 KKR VS GT",
            "M61 PBKS VS RCB", "M62 DC VS RR", "M63 CSK VS SRH", "M64 RR VS LSG", "M65 KKR VS MI",
            "M66 CSK VS GT", "M67 SRH VS RCB", "M68 LSG VS PBKS", "M69 MI VS RR", "M70 KKR VS DC",
            "QUALIFIER 1", "ELIMINATOR", "QUALIFIER 2", "FINAL"
        ];

        function getTeamsFromMatch(matchName) {
            const parts = matchName.split(' ');
            if (parts.length >= 3 && (parts[1] === 'VS' || parts[2] === 'VS')) {
                if (parts[1] === 'VS') return [parts[0], parts[2]];
                if (parts[2] === 'VS') return [parts[1], parts[3]];
            }
            return null;
        }

        const IPL_TEAMS = ["CSK", "MI", "RCB", "KKR", "GT", "LSG", "RR", "DC", "PBKS", "SRH"];

        // ======================== DATA STRUCTURE WITH AUTO-SAVE ========================
        let playerDB = {};
        let actualResults = {
            matches: {},
            seasonActual: {
                tournamentWinner: null,
                top4: [],
                orangeCapWinner: null,
                purpleCapWinner: null,
                pottWinner: null
            }
        };
        let previousWinners = [];
        let isAdminMode = false;
        const ADMIN_PASSWORD = "lordvolde";
        let currentView = "leaderboard";
        const container = document.getElementById("appContainer");
        const badge = document.getElementById("autoSaveBadge");

        function showAutoSaveBadge() {
            if (badge) {
                badge.style.opacity = "1";
                badge.style.transition = "opacity 0.3s";
                setTimeout(() => {
                    badge.style.opacity = "0.5";
                }, 1500);
            }
        }

        // SAVE ALL DATA TO LOCALSTORAGE
        function saveAllData() {
            const saveData = {
                playerDB: playerDB,
                actualResults: actualResults,
                previousWinners: previousWinners,
                isAdminMode: isAdminMode
            };
            localStorage.setItem("adpl_all_data", JSON.stringify(saveData));
            showAutoSaveBadge();
            console.log("✅ All data auto-saved to localStorage");
        }

        // LOAD ALL DATA FROM LOCALSTORAGE
        function loadAllData() {
            const savedData = localStorage.getItem("adpl_all_data");
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    playerDB = data.playerDB || {};
                    actualResults = data.actualResults || { matches: {}, seasonActual: { tournamentWinner: null, top4: [], orangeCapWinner: null, purpleCapWinner: null, pottWinner: null } };
                    previousWinners = data.previousWinners || [];
                    isAdminMode = data.isAdminMode || false;
                    console.log("✅ Data loaded from localStorage");
                    return true;
                } catch(e) {
                    console.log("Error loading data, using defaults");
                }
            }
            return false;
        }

        function initPlayers() {
            const dataLoaded = loadAllData();
            
            if (!dataLoaded) {
                for (let p of ADPL_PLAYERS) {
                    if (!playerDB[p]) {
                        let matchPreds = {};
                        IPL_MATCHES.forEach((_, idx) => { 
                            matchPreds[idx] = { winner: "", motm: "" }; 
                        });
                        playerDB[p] = {
                            predictions: {
                                matchPredictions: matchPreds,
                                season: {
                                    tournamentWinner: null,
                                    top4: [],
                                    orangeCap: { first: null, second: null, third: null },
                                    purpleCap: { first: null, second: null, third: null },
                                    pott: { first: null, second: null, third: null }
                                }
                            },
                            points: 0,
                            matchWinPoints: 0,
                            motmPoints: 0,
                            seasonPoints: 0
                        };
                    }
                }
                previousWinners = [{ year: "2025", winnerName: "Syed Askari" }];
                saveAllData();
            }
        }

        function computeAllPoints() {
            for (let p of ADPL_PLAYERS) {
                let matchWinTotal = 0;
                let motmTotal = 0;
                let seasonTotal = 0;
                const preds = playerDB[p]?.predictions;
                if (!preds) continue;
                
                for (let i = 0; i < IPL_MATCHES.length; i++) {
                    const predMatch = preds.matchPredictions[i];
                    const actual = actualResults.matches[i];
                    if (actual && predMatch) {
                        if (predMatch.winner && predMatch.winner === actual.winner) matchWinTotal += 2;
                        if (predMatch.motm && predMatch.motm === actual.motm) motmTotal += 5;
                    }
                }
                
                const season = preds.season;
                const sa = actualResults.seasonActual;
                if (season.tournamentWinner && sa.tournamentWinner === season.tournamentWinner) seasonTotal += 20;
                if (season.top4 && sa.top4) {
                    for (let t of season.top4) {
                        if (sa.top4.includes(t)) seasonTotal += 10;
                    }
                }
                if (season.orangeCap.first && sa.orangeCapWinner === season.orangeCap.first) seasonTotal += 15;
                else if (season.orangeCap.second && sa.orangeCapWinner === season.orangeCap.second) seasonTotal += 12;
                else if (season.orangeCap.third && sa.orangeCapWinner === season.orangeCap.third) seasonTotal += 10;
                if (season.purpleCap.first && sa.purpleCapWinner === season.purpleCap.first) seasonTotal += 15;
                else if (season.purpleCap.second && sa.purpleCapWinner === season.purpleCap.second) seasonTotal += 12;
                else if (season.purpleCap.third && sa.purpleCapWinner === season.purpleCap.third) seasonTotal += 10;
                if (season.pott.first && sa.pottWinner === season.pott.first) seasonTotal += 15;
                else if (season.pott.second && sa.pottWinner === season.pott.second) seasonTotal += 12;
                else if (season.pott.third && sa.pottWinner === season.pott.third) seasonTotal += 10;
                
                playerDB[p].matchWinPoints = matchWinTotal;
                playerDB[p].motmPoints = motmTotal;
                playerDB[p].seasonPoints = seasonTotal;
                playerDB[p].points = matchWinTotal + motmTotal + seasonTotal;
            }
            saveAllData();
        }

        function verifyAdmin() {
            if (!isAdminMode) {
                const pwd = prompt("🔐 Admin Access Required. Enter password:");
                if (pwd === ADMIN_PASSWORD) {
                    isAdminMode = true;
                    saveAllData();
                    alert("✅ Admin access granted!");
                    return true;
                } else {
                    alert("❌ Invalid password! Only admin can update data.");
                    return false;
                }
            }
            return true;
        }

        // ======================== RENDER FUNCTIONS ========================
        function renderLeaderboard() {
            const sorted = [...ADPL_PLAYERS].sort((a,b) => playerDB[b].points - playerDB[a].points);
            let html = `<div class="card">
                <h2>🏅 ADPL 2026 Leaderboard - Detailed Points Breakdown</h2>
                <div class="stats-summary">
                    <div class="stat-box">🏆 Winner Points: +2 per correct match winner</div>
                    <div class="stat-box">⭐ MOTM Points: +5 per correct MOTM</div>
                    <div class="stat-box">🏆 Season Points: Tournament + Top4 + Caps + POTT</div>
                </div>
                <table class="leaderboard-table">
                    <thead>
                        <tr><th>#</th><th>Player</th><th>🏆 Match Winner</th><th>⭐ MOTM</th><th>🏆 Season</th><th>🔥 TOTAL</th> </tr>
                    </thead>
                    <tbody>`;
            sorted.forEach((player, idx) => {
                let rankClass = idx === 0 ? "rank-1" : idx === 1 ? "rank-2" : idx === 2 ? "rank-3" : "";
                html += `<tr class="${rankClass}">
                               <td>${idx+1}</td>
                            <td class="player-clickable" data-player="${player}">${player}</td>
                            <td class="stat-number">${playerDB[player].matchWinPoints}</td>
                            <td class="stat-number">${playerDB[player].motmPoints}</td>
                            <td class="stat-number">${playerDB[player].seasonPoints}</td>
                            <td class="points-badge">${playerDB[player].points}</td>
                          </tr>`;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
            document.querySelectorAll(".player-clickable").forEach(el => {
                el.addEventListener("click", () => showPlayerProfile(el.getAttribute("data-player")));
            });
        }

        function showPlayerProfile(playerName) {
            const preds = playerDB[playerName].predictions;
            let html = `<div class="card">
                <div class="flex-between">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        ${renderPlayerAvatar(playerName, "large")}
                        <h2>${playerName}</h2>
                    </div>
                    <button id="backToLeaderboardBtn">← Back to Leaderboard</button>
                </div>
                <div class="stats-summary" style="justify-content:center">
                    <div class="stat-box">🏆 Match Wins: ${playerDB[playerName].matchWinPoints}</div>
                    <div class="stat-box">⭐ MOTM: ${playerDB[playerName].motmPoints}</div>
                    <div class="stat-box">🏆 Season: ${playerDB[playerName].seasonPoints}</div>
                    <div class="stat-box">🔥 Total: ${playerDB[playerName].points}</div>
                </div>`;
            
            html += `<h3>📅 Match Predictions (Winner + MOTM) - ${IPL_MATCHES.length} Matches</h3>
            <div class="search-filter"><input type="text" id="matchSearch" placeholder="🔍 Search match" style="width:250px"></div>
            <div class="matches-container" id="matchesContainer">`;
            
            IPL_MATCHES.forEach((match, idx) => {
                const mp = preds.matchPredictions[idx];
                const teams = getTeamsFromMatch(match);
                html += `<div class="match-item" data-match-name="${match.toLowerCase()}">
                    <div class="match-header"><span>🏏 ${match}</span></div>`;
                
                if (teams) {
                    html += `<div class="pred-row"><span class="pred-label">🏆 Winner:</span>
                        <select class="winner-sel" data-match="${idx}"><option value="">Select Winner</option>`;
                    teams.forEach(team => {
                        html += `<option value="${team}" ${mp.winner === team ? 'selected' : ''}>${team}</option>`;
                    });
                    html += `</select></div>`;
                } else {
                    html += `<div class="pred-row"><span class="pred-label">🏆 Winner:</span>
                        <input type="text" class="winner-input" data-match="${idx}" placeholder="Enter winning team/player" value="${mp.winner || ''}"></div>`;
                }
                html += `<div class="pred-row"><span class="pred-label">⭐ Man of the Match:</span>
                    <input type="text" class="motm-input" data-match="${idx}" placeholder="Enter player name" value="${mp.motm || ''}"></div></div>`;
            });
            html += `</div>`;

            const s = preds.season;
            html += `<div class="admin-section"><h3>🏆 Season Awards Predictions</h3>`;
            html += `<div class="pred-row"><span class="pred-label">🏆 Tournament Winner:</span>
                <input type="text" id="seasonWinner" placeholder="Enter team name" value="${s.tournamentWinner || ''}"></div>`;
            html += `<div><span class="pred-label">🏅 Top 4 Playoff Teams:</span><div class="pred-row">`;
            for(let i=0;i<4;i++) {
                let val = s.top4[i] || "";
                html += `<input type="text" class="top4slot" data-slot="${i}" placeholder="Team ${i+1}" value="${val}" style="width:120px">`;
            }
            html += `</div></div>`;
            html += `<div><span class="pred-label">🧡 Orange Cap:</span><div class="pred-row"><input type="text" id="orange1" placeholder="1st choice" value="${s.orangeCap.first || ''}"><input type="text" id="orange2" placeholder="2nd choice" value="${s.orangeCap.second || ''}"><input type="text" id="orange3" placeholder="3rd choice" value="${s.orangeCap.third || ''}"></div></div>`;
            html += `<div><span class="pred-label">💜 Purple Cap:</span><div class="pred-row"><input type="text" id="purple1" placeholder="1st choice" value="${s.purpleCap.first || ''}"><input type="text" id="purple2" placeholder="2nd choice" value="${s.purpleCap.second || ''}"><input type="text" id="purple3" placeholder="3rd choice" value="${s.purpleCap.third || ''}"></div></div>`;
            html += `<div><span class="pred-label">👑 POTT:</span><div class="pred-row"><input type="text" id="pott1" placeholder="1st choice" value="${s.pott.first || ''}"><input type="text" id="pott2" placeholder="2nd choice" value="${s.pott.second || ''}"><input type="text" id="pott3" placeholder="3rd choice" value="${s.pott.third || ''}"></div></div>`;
            html += `<button id="saveProfileBtn">💾 Save Predictions</button><span id="profileSaveMsg" class="save-msg"></span></div></div>`;
            container.innerHTML = html;

            document.getElementById("matchSearch")?.addEventListener("input", (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll(".match-item").forEach(item => {
                    item.style.display = item.getAttribute("data-match-name").includes(term) ? "block" : "none";
                });
            });
            document.getElementById("backToLeaderboardBtn").addEventListener("click", () => { renderLeaderboard(); currentView = "leaderboard"; highlightNav(); });
            document.getElementById("saveProfileBtn").addEventListener("click", () => {
                document.querySelectorAll(".winner-sel").forEach(sel => playerDB[playerName].predictions.matchPredictions[parseInt(sel.dataset.match)].winner = sel.value);
                document.querySelectorAll(".winner-input").forEach(inp => playerDB[playerName].predictions.matchPredictions[parseInt(inp.dataset.match)].winner = inp.value);
                document.querySelectorAll(".motm-input").forEach(inp => playerDB[playerName].predictions.matchPredictions[parseInt(inp.dataset.match)].motm = inp.value);
                playerDB[playerName].predictions.season.tournamentWinner = document.getElementById("seasonWinner").value || null;
                let top4arr = [];
                for(let i=0;i<4;i++) top4arr.push(document.querySelector(`.top4slot[data-slot="${i}"]`).value);
                playerDB[playerName].predictions.season.top4 = top4arr.filter(t=>t);
                playerDB[playerName].predictions.season.orangeCap = { first: document.getElementById("orange1").value, second: document.getElementById("orange2").value, third: document.getElementById("orange3").value };
                playerDB[playerName].predictions.season.purpleCap = { first: document.getElementById("purple1").value, second: document.getElementById("purple2").value, third: document.getElementById("purple3").value };
                playerDB[playerName].predictions.season.pott = { first: document.getElementById("pott1").value, second: document.getElementById("pott2").value, third: document.getElementById("pott3").value };
                computeAllPoints();
                document.getElementById("profileSaveMsg").innerText = "✅ Saved & Auto-saved!";
                setTimeout(() => document.getElementById("profileSaveMsg").innerText = "", 1500);
            });
        }

        function renderPlayersGrid() {
            let html = `<div class="card"><h2>👥 ADPL Players & Their Stats</h2><div class="players-grid">`;
            ADPL_PLAYERS.forEach(p => {
                html += `<div class="player-card" data-player="${p}">
                            ${renderPlayerAvatar(p, "small")}
                            <div class="player-name-card">${p}</div>
                            <div class="player-points-preview">🏆 Wins: ${playerDB[p].matchWinPoints} | ⭐ MOTM: ${playerDB[p].motmPoints}</div>
                            <div style="font-size:0.7rem;">🏆 Season: ${playerDB[p].seasonPoints} | 🔥 Total: ${playerDB[p].points}</div>
                         </div>`;
            });
            html += `</div><button id="backFromPlayers" class="nav-link">Back to Leaderboard</button></div>`;
            container.innerHTML = html;
            document.querySelectorAll(".player-card").forEach(card => {
                card.addEventListener("click", () => showPlayerProfile(card.getAttribute("data-player")));
            });
            document.getElementById("backFromPlayers")?.addEventListener("click", () => { renderLeaderboard(); currentView = "leaderboard"; highlightNav(); });
        }

        function renderWinnersView() {
            let html = `<div class="card"><h2>📋 Official Results & Winners</h2>`;
            html += `<h3>🏏 Match Results</h3><div class="matches-container" style="max-height:500px">`;
            IPL_MATCHES.forEach((match, idx) => {
                const res = actualResults.matches[idx];
                html += `<div class="match-item"><div class="match-header">${match}</div>
                        <div>🏆 Winner: <strong>${res?.winner || "❓ Not Declared"}</strong></div>
                        <div>⭐ MOTM: <strong>${res?.motm || "Pending"}</strong></div></div>`;
            });
            html += `</div><h3>🏆 Season Awards</h3><div class="admin-section">`;
            const sa = actualResults.seasonActual;
            html += `<p>🏆 Tournament Winner: ${sa.tournamentWinner || "TBD"}</p><p>🏅 Top 4: ${sa.top4.length ? sa.top4.join(", ") : "TBD"}</p>`;
            html += `<p>🧡 Orange Cap: ${sa.orangeCapWinner || "TBD"}</p><p>💜 Purple Cap: ${sa.purpleCapWinner || "TBD"}</p><p>👑 POTT: ${sa.pottWinner || "TBD"}</p>`;
            html += `</div><button id="backWinnersBtn" class="nav-link">Back</button></div>`;
            container.innerHTML = html;
            document.getElementById("backWinnersBtn")?.addEventListener("click", () => { renderLeaderboard(); currentView = "leaderboard"; highlightNav(); });
        }

        function renderPrevWinners() {
            let html = `<div class="card"><h2>🏆 Previous Year Winners</h2>`;
            if (previousWinners.length === 0) {
                html += `<p>No previous winners data available.</p>`;
            } else {
                previousWinners.forEach(w => {
                    html += `<div class="winner-card">
                                <div class="winner-trophy">🏆</div>
                                <div class="winner-year">${w.year}</div>
                                <div class="winner-name">${w.winnerName}</div>
                            </div>`;
                });
            }
            if (isAdminMode) {
                html += `<div class="admin-section"><h3>➕ Add Previous Year Winner (Admin Only)</h3>
                        <div class="pred-row">
                            <input type="text" id="newYear" placeholder="Year (e.g., 2026)" style="width:120px">
                            <input type="text" id="newWinnerName" placeholder="Winner Name" style="width:200px">
                            <button id="addWinnerBtn">➕ Add Winner</button>
                        </div>
                        </div>`;
            }
            html += `<button id="backPrevBtn" class="nav-link" style="margin-top:1rem">Back</button></div>`;
            container.innerHTML = html;
            if (isAdminMode) {
                document.getElementById("addWinnerBtn")?.addEventListener("click", () => {
                    const year = document.getElementById("newYear").value;
                    const winnerName = document.getElementById("newWinnerName").value;
                    if (year && winnerName) {
                        previousWinners.unshift({ year, winnerName });
                        saveAllData();
                        renderPrevWinners();
                        alert(`✅ Added: ${winnerName} won in ${year}`);
                    } else {
                        alert("Please enter both Year and Winner Name!");
                    }
                });
            }
            document.getElementById("backPrevBtn")?.addEventListener("click", () => { renderLeaderboard(); currentView = "leaderboard"; highlightNav(); });
        }

        function renderRulesView() {
            const html = `<div class="card">
                <h2>📜 ADPL 2026 – OFFICIAL RULES & POINT SYSTEM 🔥</h2>
                <div class="rules-container">
                    <div class="rule-block">
                        <div class="rule-title">🔮 MATCH PREDICTIONS</div>
                        <div class="rule-content">
                            <div class="rule-point">✅ Match Winner → <span class="highlight">+2 points</span></div>
                            <div class="rule-point">⭐ Man of the Match (MOTM) → <span class="highlight">+5 points</span></div>
                            <div class="rule-point">👉 <strong>Max per match = 7 points</strong></div>
                        </div>
                    </div>
                    <div class="rule-block">
                        <div class="rule-title">🧾 SEASON PREDICTIONS (Submit before IPL starts)</div>
                        <div class="rule-content">
                            <div class="rule-point">🏆 Tournament Winner ✔ Correct → <span class="highlight">+20 points</span></div>
                            <div class="rule-point">🔝 Top 4 Playoff Teams ✔ Each correct team → <span class="highlight">+10 points</span> (Max = 40 points)</div>
                            <div class="rule-point">🧡 Orange Cap | 💜 Purple Cap | 👑 POTT — Give 3 choices in priority order:<br>
                            🥇 1st Choice → <span class="highlight">+15 points</span><br>
                            🥈 2nd Choice → <span class="highlight">+12 points</span><br>
                            🥉 3rd Choice → <span class="highlight">+10 points</span><br>
                            ❌ Wrong → 0 points</div>
                        </div>
                    </div>
                    <div class="rule-block">
                        <div class="rule-title">❌ WRONG PREDICTION RULE</div>
                        <div class="rule-content">Any incorrect or missed prediction → <span class="highlight">0 points</span><br>No negative marking ✅</div>
                    </div>
                    <div class="rule-block">
                        <div class="rule-title">⏰ DEADLINES</div>
                        <div class="rule-content">
                            🕒 Match Predictions: Winner → Before toss | MOTM → Before match starts<br>
                            📅 Season Predictions: Submit all (Winner, Top 4, Caps, POTT) 👉 <span class="highlight">1 day before IPL begins</span>
                        </div>
                    </div>
                </div>
                <button id="backRulesBtn" class="nav-link" style="margin-top:1rem">← Back</button>
            </div>`;
            container.innerHTML = html;
            document.getElementById("backRulesBtn")?.addEventListener("click", () => { handleNavigation("leaderboard"); });
        }

        function renderMoreView() {
            const html = `<div class="card">
                <h2>🎬 ADPL Extras – Introduction & Theme</h2>
                <div class="media-container">
                    <div class="media-card">
                        <h3>📽️ Player Introduction Video</h3>
                        <video id="introVideo" controls preload="metadata">
                            <source src="introduction.mp4" type="video/mp4">
                            Your browser does not support the video tag. Please ensure "introduction.mp4" is in the root folder.
                        </video>
                        <p style="font-size:0.8rem; margin-top:8px; color:#aaa;">🎬 Official ADPL 2026 intro – meet the contenders!</p>
                    </div>
                    <div class="media-card">
                        <h3>🎵 Theme Song</h3>
                        <audio id="themeAudio" controls>
                            <source src="theme.mp3" type="audio/mpeg">
                            Your browser does not support the audio element. Please ensure "theme.mp3" is present.
                        </audio>
                        <p style="font-size:0.8rem; margin-top:8px; color:#aaa;">🎧 ADPL 2026 Anthem – play it loud!</p>
                    </div>
                    <div>
                        <h3>ORGANISED BY-</h3>
                        <img src="footer.png" alt="sena" style="max-width: 100%; height: auto;">
                    </div>
                    <div>
                        <h3>SPECIAL THANKS</h3>
                        <img src="background.png" alt="DARK LORD" style="max-width: 100%; height: auto;">
                    </div>
                </div>
                <button id="backMoreBtn" class="nav-link" style="margin-top:1rem">← Back</button>
            </div>`;
            container.innerHTML = html;
            document.getElementById("backMoreBtn")?.addEventListener("click", () => { handleNavigation("leaderboard"); });
        }

        function renderAdminPanel() {
            if (!verifyAdmin()) {
                renderLeaderboard();
                currentView = "leaderboard";
                highlightNav();
                return;
            }
            let html = `<div class="card"><h2>⚙️ Admin Panel</h2><div class="admin-warning">⚠️ You are in Admin Mode. Only you can update results.</div>`;
            html += `<div class="admin-section"><h3>🏏 Update Match Results</h3>
            <div class="search-filter"><input type="text" id="adminMatchSearch" placeholder="🔍 Search match"></div>
            <div class="matches-container" id="adminMatchesContainer" style="max-height:500px">`;
            IPL_MATCHES.forEach((match, idx) => {
                const existing = actualResults.matches[idx] || { winner: "", motm: "" };
                const teams = getTeamsFromMatch(match);
                html += `<div class="match-item" data-match-name="${match.toLowerCase()}"><strong>${match}</strong>`;
                if (teams) {
                    html += `<div class="pred-row"><select id="adminWin_${idx}"><option value="">-- Winner --</option>`;
                    teams.forEach(team => html += `<option value="${team}" ${existing.winner === team ? 'selected' : ''}>${team}</option>`);
                    html += `</select>`;
                } else {
                    html += `<div class="pred-row"><input type="text" id="adminWin_${idx}" placeholder="Winner" value="${existing.winner || ''}">`;
                }
                html += `<input type="text" id="adminMotm_${idx}" placeholder="MOTM" value="${existing.motm || ''}"></div></div>`;
            });
            html += `</div><button id="saveMatchResultsBtn">💾 Save All Match Results</button></div>`;

            html += `<div class="admin-section"><h3>🏆 Season Awards Actuals</h3>`;
            const sa = actualResults.seasonActual;
            html += `<div class="pred-row"><label>Tournament Winner:</label><input type="text" id="actualTourney" value="${sa.tournamentWinner || ''}"></div>`;
            html += `<div><label>Top 4 Teams:</label><div class="pred-row">`;
            for(let i=0;i<4;i++) html += `<input type="text" class="actualTop4" data-idx="${i}" placeholder="Team ${i+1}" value="${sa.top4[i] || ''}" style="width:120px">`;
            html += `</div></div>`;
            html += `<div class="pred-row"><label>Orange Cap Winner:</label><input type="text" id="actualOrange" value="${sa.orangeCapWinner || ''}"></div>`;
            html += `<div class="pred-row"><label>Purple Cap Winner:</label><input type="text" id="actualPurple" value="${sa.purpleCapWinner || ''}"></div>`;
            html += `<div class="pred-row"><label>POTT Winner:</label><input type="text" id="actualPott" value="${sa.pottWinner || ''}"></div>`;
            html += `<button id="saveSeasonActualBtn">💾 Save Season Awards</button></div>`;
            html += `<button id="adminBackBtn" class="nav-link">← Back</button></div>`;
            container.innerHTML = html;

            document.getElementById("adminMatchSearch")?.addEventListener("input", (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll("#adminMatchesContainer .match-item").forEach(item => {
                    item.style.display = item.getAttribute("data-match-name").includes(term) ? "block" : "none";
                });
            });
            document.getElementById("saveMatchResultsBtn")?.addEventListener("click", () => {
                IPL_MATCHES.forEach((_, idx) => {
                    actualResults.matches[idx] = { 
                        winner: document.getElementById(`adminWin_${idx}`)?.value || null, 
                        motm: document.getElementById(`adminMotm_${idx}`)?.value || null 
                    };
                });
                computeAllPoints();
                alert("Match results saved!");
            });
            document.getElementById("saveSeasonActualBtn")?.addEventListener("click", () => {
                let top4Arr = [];
                for(let i=0;i<4;i++) top4Arr.push(document.querySelector(`.actualTop4[data-idx="${i}"]`).value);
                actualResults.seasonActual = {
                    tournamentWinner: document.getElementById("actualTourney").value || null,
                    top4: top4Arr.filter(t=>t),
                    orangeCapWinner: document.getElementById("actualOrange").value || null,
                    purpleCapWinner: document.getElementById("actualPurple").value || null,
                    pottWinner: document.getElementById("actualPott").value || null
                };
                computeAllPoints();
                alert("Season awards saved!");
            });
            document.getElementById("adminBackBtn")?.addEventListener("click", () => { renderLeaderboard(); currentView = "leaderboard"; highlightNav(); });
        }

        function highlightNav() {
            document.querySelectorAll(".nav-link").forEach(btn => btn.classList.remove("active"));
            const activeBtn = Array.from(document.querySelectorAll(".nav-link")).find(btn => btn.getAttribute("data-view") === currentView);
            if(activeBtn) activeBtn.classList.add("active");
        }

        function handleNavigation(view) {
            currentView = view;
            if(view === "leaderboard") renderLeaderboard();
            else if(view === "players") renderPlayersGrid();
            else if(view === "winners") renderWinnersView();
            else if(view === "prevWinners") renderPrevWinners();
            else if(view === "rules") renderRulesView();
            else if(view === "more") renderMoreView();
            else if(view === "admin") renderAdminPanel();
            highlightNav();
        }

        document.querySelectorAll(".nav-link").forEach(btn => {
            btn.addEventListener("click", () => handleNavigation(btn.getAttribute("data-view")));
        });

        initPlayers();
        computeAllPoints();
        handleNavigation("leaderboard");
    </script>
</body>
</html>
